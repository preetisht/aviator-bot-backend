name = "aviator-bot-api"
main = "src/index.ts"
compatibility_date = "2024-05-01"

[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://aviator-bot.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "aviator-db"
database_id = "PLACEHOLDER_REPLACE_AFTER_CREATION"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "PLACEHOLDER_REPLACE_AFTER_CREATION"

[env.dev]
[env.dev.vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "*"
